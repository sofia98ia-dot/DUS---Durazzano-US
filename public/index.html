<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>DUS — Durazzano Us</title>
<style>
  :root{
    --bg:#0c1020; --panel:#141a30; --line:#26304f; --ink:#e8ecf7;
    --muted:#8a93b2; --accent:#6ee7ff; --danger:#ff5470; --good:#4ade80;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
  button{font-family:inherit;cursor:pointer;border:none}
  .hidden{display:none !important}

  #lobby{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:26px;width:min(440px,92vw);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .card h1{margin:0;font-size:30px;letter-spacing:2px;font-weight:800}
  .card .sub{color:var(--muted);font-size:13px;margin:2px 0 18px}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.6px}
  input[type=text]{width:100%;background:#0d122a;border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:12px 14px;font-size:16px;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  #codeInput{text-transform:uppercase;letter-spacing:6px;text-align:center;font-weight:700;font-size:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .sw{width:34px;height:34px;border-radius:50%;border:3px solid transparent;transition:transform .1s}
  .sw:hover{transform:scale(1.08)}
  .sw.sel{border-color:#fff}
  .btn{width:100%;margin-top:14px;background:var(--accent);color:#04121a;font-weight:700;
    font-size:16px;padding:13px;border-radius:11px}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .or{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:16px 0 4px}
  .or::before,.or::after{content:'';flex:1;height:1px;background:var(--line)}
  .row{display:flex;gap:8px}
  .row input{flex:1}
  .row .btn{width:auto;margin:0;padding:0 18px}
  .players{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .prow{display:flex;align-items:center;gap:10px;background:#0d122a;border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;font-size:14px}
  .dot{width:16px;height:16px;border-radius:50%}
  .host-tag{margin-left:auto;font-size:11px;color:var(--accent)}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px}
  .codebox{background:#0d122a;border:1px dashed var(--accent);border-radius:12px;text-align:center;padding:14px;margin-top:4px}
  .codebox .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .codebox .val{font-size:34px;font-weight:800;letter-spacing:10px;color:var(--accent);margin-top:2px}

  #game{position:absolute;inset:0}
  canvas{display:block;width:100%;height:100%;background:#070a15}
  #hud{position:absolute;left:0;right:0;top:0;padding:12px 14px;display:flex;gap:10px;align-items:center;
    pointer-events:none;font-size:13px}
  .pill{background:rgba(20,26,48,.85);border:1px solid var(--line);border-radius:999px;
    padding:7px 13px;backdrop-filter:blur(6px)}
  .role-imp{color:var(--danger);font-weight:700}
  .role-crew{color:var(--accent);font-weight:700}
  #progressWrap{flex:1;max-width:260px}
  #progressBar{height:8px;background:#0d122a;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  #progressFill{height:100%;width:0;background:var(--good);transition:width .3s}
  #actions{position:absolute;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:12px;align-items:flex-end}
  .abtn{width:78px;height:78px;border-radius:50%;font-weight:800;font-size:13px;color:#fff;
    border:3px solid rgba(255,255,255,.25);box-shadow:0 8px 24px rgba(0,0,0,.5)}
  #killBtn{background:var(--danger)}
  #reportBtn{background:#ffb703;color:#241a00}
  #useBtn{background:var(--accent);color:#04121a}
  #emergBtn{background:#3a86ff}
  .abtn:disabled{opacity:.3}
  #joystick{position:absolute;left:24px;bottom:calc(24px + env(safe-area-inset-bottom));
    width:130px;height:130px;border-radius:50%;background:rgba(20,26,48,.5);border:1px solid var(--line);touch-action:none}
  #stick{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(110,231,255,.6);left:37px;top:37px}
  .desktop-hint{position:absolute;left:16px;bottom:16px;color:var(--muted);font-size:12px}

  #overlay{position:absolute;inset:0;background:rgba(6,9,20,.92);display:flex;
    align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}
  .voteCard{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:22px;width:min(460px,94vw);max-height:90vh;overflow:auto}
  .voteCard h2{margin:0 0 4px}
  .vhead{color:var(--muted);font-size:13px;margin-bottom:14px}
  .timer{float:right;color:var(--accent);font-weight:700}
  .voteRow{display:flex;align-items:center;gap:11px;background:#0d122a;border:1px solid var(--line);
    border-radius:11px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:border-color .1s}
  .voteRow:hover{border-color:var(--accent)}
  .voteRow.dead{opacity:.4;cursor:not-allowed}
  .voteRow.mine{border-color:var(--accent)}
  .voteCount{margin-left:auto;color:var(--muted);font-size:13px}
  .result{text-align:center;font-size:18px;margin:14px 0}
  .big{font-size:30px;font-weight:800;text-align:center;margin:6px 0}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="card">
    <h1>DUS</h1>
    <div class="sub">Durazzano Us — skeleton</div>

    <!-- Setup profilo + scelta stanza -->
    <div id="joinBox">
      <label>Il tuo nome</label>
      <input id="nameInput" type="text" maxlength="14" placeholder="Scegli un nome" />
      <label>Colore</label>
      <div class="swatches" id="swatches"></div>

      <button class="btn" id="createBtn">Crea una nuova stanza</button>
      <div class="or">oppure entra con un codice</div>
      <div class="row">
        <input id="codeInput" type="text" maxlength="4" placeholder="CODICE" />
        <button class="btn" id="joinBtn">Entra</button>
      </div>
      <div class="err" id="joinErr"></div>
    </div>

    <!-- Sala d'attesa -->
    <div id="waitBox" class="hidden">
      <div class="codebox">
        <div class="lbl">Codice stanza — condividilo</div>
        <div class="val" id="roomCode">----</div>
      </div>
      <label>Giocatori</label>
      <div class="players" id="playerList"></div>
      <button class="btn" id="startBtn" disabled>Avvia partita</button>
      <button class="btn ghost" id="leaveBtn">Esci dalla stanza</button>
      <div class="err" id="waitMsg"></div>
    </div>
  </div>
</div>

<!-- GIOCO -->
<div id="game" class="hidden">
  <canvas id="cv"></canvas>
  <div id="hud">
    <span class="pill" id="rolePill">—</span>
    <div class="pill" id="progressWrap"><div id="progressBar"><div id="progressFill"></div></div></div>
    <span class="pill" id="alivePill"></span>
  </div>
  <div id="joystick" class="hidden"><div id="stick"></div></div>
  <div class="desktop-hint" id="desktopHint">Muoviti con WASD o le frecce</div>
  <div id="actions">
    <button class="abtn hidden" id="emergBtn">EMERG</button>
    <button class="abtn hidden" id="reportBtn">REPORT</button>
    <button class="abtn hidden" id="useBtn">USA</button>
    <button class="abtn hidden" id="killBtn">UCCIDI</button>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="hidden"><div class="voteCard" id="voteCard"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let ME = { id:null };
let SELF = {};
let LAST = null;
let CFG = null;
let phase = 'LOBBY';
let prevPhase = 'LOBBY';
let selColor = null;
let MY_CODE = null;
let curMeeting = null;   // ultima riunione ricevuta (per i click sul voto)
let voteSig = null;      // firma del contenuto voti: ridisegna solo se cambia
let revealTimer = null;  // timer della schermata "sei impostore/equipaggio"
const $ = s => document.querySelector(s);

// ---------- Colori ----------
socket.on('colors', ({ colors }) => renderSwatches(colors));
function renderSwatches(colors){
  const box = $('#swatches'); box.innerHTML='';
  if(!selColor) selColor = colors[0];
  colors.forEach(c=>{
    const d=document.createElement('div');
    d.className='sw'+(c===selColor?' sel':'');
    d.style.background=c;
    d.onclick=()=>{selColor=c;[...box.children].forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    box.appendChild(d);
  });
}

function profileOK(){
  const name=$('#nameInput').value.trim();
  if(!name){$('#joinErr').textContent='Inserisci un nome.';return null;}
  if(!selColor){$('#joinErr').textContent='Scegli un colore.';return null;}
  return { name, color:selColor };
}
$('#createBtn').onclick=()=>{ const p=profileOK(); if(p) socket.emit('createRoom',p); };
$('#joinBtn').onclick=()=>{
  const p=profileOK(); if(!p) return;
  const code=$('#codeInput').value.trim().toUpperCase();
  if(code.length!==4){$('#joinErr').textContent='Il codice ha 4 caratteri.';return;}
  socket.emit('joinRoom',{...p,code});
};
$('#codeInput').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase();});
socket.on('joinError', m=> $('#joinErr').textContent=m );
$('#startBtn').onclick=()=> socket.emit('start');
$('#leaveBtn').onclick=()=> location.reload();

// ---------- Phase ----------
socket.on('phase', (d)=>{
  const wasPhase = prevPhase;
  phase=d.phase;
  if(d.you&&d.you.id) ME.id=d.you.id;
  if(d.code) MY_CODE=d.code;
  if(d.config) CFG=d.config;

  if(phase==='LOBBY'){
    $('#game').classList.add('hidden');
    $('#overlay').classList.add('hidden');
    $('#lobby').classList.remove('hidden');
    if(d.lobby) renderLobby(d.lobby, d.minPlayers);
  } else if(phase==='END'){
    showGameOver(d.winner);
  } else {
    $('#lobby').classList.add('hidden');
    $('#game').classList.remove('hidden');
    // inizio di una nuova partita: mostra il ruolo a schermo intero
    const showingReveal = (phase==='PLAYING' && wasPhase==='LOBBY' && d.you);
    if(showingReveal) showRoleReveal(d.you.role);
    else if(phase==='PLAYING') $('#overlay').classList.add('hidden');
    fitCanvas();
  }
  prevPhase = d.phase;
});

function renderLobby(list, minPlayers){
  const joined = list.some(p=>p.id===ME.id);
  $('#joinBox').classList.toggle('hidden', joined);
  $('#waitBox').classList.toggle('hidden', !joined);
  if(MY_CODE) $('#roomCode').textContent = MY_CODE;
  const wrap=$('#playerList'); wrap.innerHTML='';
  list.forEach(p=>{
    const r=document.createElement('div'); r.className='prow';
    r.innerHTML=`<span class="dot" style="background:${p.color}"></span>${escapeHtml(p.name)}`;
    if(p.isHost){const t=document.createElement('span');t.className='host-tag';t.textContent='HOST';r.appendChild(t);}
    wrap.appendChild(r);
  });
  const me=list.find(p=>p.id===ME.id);
  const canStart = me && me.isHost && list.length>=minPlayers;
  $('#startBtn').disabled=!canStart;
  $('#waitMsg').textContent = list.length<minPlayers
    ? `Servono almeno ${minPlayers} giocatori (${list.length} in stanza).`
    : (me&&me.isHost?'Puoi avviare la partita.':'In attesa che l\'host avvii.');
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---------- Input ----------
const keys={up:false,down:false,left:false,right:false};
const KEYMAP={ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down',ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right'};
function sendInput(){ socket.emit('input',{...keys}); }
addEventListener('keydown',e=>{const k=KEYMAP[e.code];if(k&&!keys[k]){keys[k]=true;sendInput();}});
addEventListener('keyup',e=>{const k=KEYMAP[e.code];if(k&&keys[k]){keys[k]=false;sendInput();}});

const isTouch = matchMedia('(pointer:coarse)').matches;
if(isTouch){ $('#joystick').classList.remove('hidden'); $('#desktopHint').classList.add('hidden'); }
(function(){
  const js=$('#joystick'), st=$('#stick'); let active=false, cx=0, cy=0; const R=37;
  function set(dx,dy){
    const mag=Math.hypot(dx,dy)||1; const cl=Math.min(mag,R);
    const nx=dx/mag*cl, ny=dy/mag*cl;
    st.style.left=(37+nx)+'px'; st.style.top=(37+ny)+'px';
    const th=R*0.35; keys.left=nx<-th; keys.right=nx>th; keys.up=ny<-th; keys.down=ny>th; sendInput();
  }
  function reset(){active=false;st.style.left='37px';st.style.top='37px';keys.up=keys.down=keys.left=keys.right=false;sendInput();}
  js.addEventListener('touchstart',e=>{active=true;const r=js.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;const t=e.touches[0];set(t.clientX-cx,t.clientY-cy);e.preventDefault();},{passive:false});
  js.addEventListener('touchmove',e=>{if(!active)return;const t=e.touches[0];set(t.clientX-cx,t.clientY-cy);e.preventDefault();},{passive:false});
  js.addEventListener('touchend',e=>{reset();e.preventDefault();},{passive:false});
})();

$('#killBtn').onclick=()=>socket.emit('kill');
$('#reportBtn').onclick=()=>socket.emit('report');
$('#emergBtn').onclick=()=>socket.emit('emergency');
$('#useBtn').onclick=()=>{ if(SELF.nearTask) socket.emit('completeTask',{taskId:SELF.nearTask}); };

// ---------- State ----------
socket.on('state', (s)=>{
  LAST=s; SELF=s.you||{}; phase=s.phase;
  if(phase==='MEETING' && s.meeting) renderMeeting(s.meeting);
  else { curMeeting=null; voteSig=null; }
  updateHUD(s);
});
function updateHUD(s){
  const you=s.you;
  const rp=$('#rolePill');
  rp.innerHTML = you.role==='IMPOSTOR' ? '<span class="role-imp">IMPOSTORE</span>' : '<span class="role-crew">EQUIPAGGIO</span>';
  if(!you.alive) rp.innerHTML+=' <span style="color:var(--muted)">(fantasma)</span>';
  const pct = s.progress.total? Math.round(100*s.progress.done/s.progress.total):0;
  $('#progressFill').style.width=pct+'%';
  $('#alivePill').textContent = `Vivi: ${s.players.filter(p=>p.alive).length}`;

  const playing = phase==='PLAYING';
  const kb=$('#killBtn');
  if(playing && you.role==='IMPOSTOR' && you.alive){ kb.classList.remove('hidden');
    kb.disabled=!you.killTarget; kb.textContent=you.killCooldown>0?you.killCooldown:'UCCIDI'; }
  else kb.classList.add('hidden');
  const rb=$('#reportBtn');
  if(playing && you.alive){ rb.classList.remove('hidden'); rb.disabled=!you.nearBody; } else rb.classList.add('hidden');
  const ub=$('#useBtn');
  if(playing){ ub.classList.remove('hidden'); ub.disabled=!you.nearTask; } else ub.classList.add('hidden');
  const eb=$('#emergBtn');
  if(playing && you.alive){ eb.classList.remove('hidden'); eb.disabled=you.emergencyLeft<=0; } else eb.classList.add('hidden');
}

// ---------- Ruolo a inizio partita ----------
function showRoleReveal(role){
  const imp = role==='IMPOSTOR';
  $('#overlay').classList.remove('hidden');
  voteSig=null; curMeeting=null;
  $('#voteCard').innerHTML=`
    <div class="big" style="color:${imp?'var(--danger)':'var(--accent)'}">${imp?'SEI UN IMPOSTORE':'SEI DELL\'EQUIPAGGIO'}</div>
    <div class="result" style="color:var(--muted)">${imp?'Elimina l\'equipaggio senza farti scoprire. Usa i condotti… quando li aggiungeremo!':'Completa i task e scopri chi è l\'impostore.'}</div>`;
  clearTimeout(revealTimer);
  revealTimer=setTimeout(()=>{ if(phase==='PLAYING') $('#overlay').classList.add('hidden'); }, 3500);
}

// ---------- Meeting ----------
// Un solo handler delegato sul contenitore stabile: sopravvive ai ridisegni.
$('#voteCard').addEventListener('click', (e)=>{
  const row = e.target.closest('.voteRow');
  if(!row || !curMeeting) return;
  if(!curMeeting.canVote || curMeeting.myVote!==null) return;
  if(row.classList.contains('dead')) return;
  socket.emit('vote', { target: row.dataset.id });
});

function renderMeeting(m){
  curMeeting=m;
  $('#overlay').classList.remove('hidden');
  const counts={}; m.votes.forEach(v=> counts[v.target]=(counts[v.target]||0)+1 );

  // costruisci lo scheletro una sola volta per riunione
  if(voteSig===null){
    $('#voteCard').innerHTML=`
      <span class="timer" id="voteTimer"></span>
      <h2>Riunione</h2>
      <div class="vhead">${escapeHtml(m.reason)} — ${escapeHtml(m.calledBy)}</div>
      <div id="voteRows"></div>
      <div class="vhead" id="voteStatus" style="margin-top:10px"></div>`;
  }
  // il timer si aggiorna ogni tick, senza toccare i pulsanti
  const vt=$('#voteTimer'); if(vt) vt.textContent = m.secondsLeft+'s';

  // ridisegna le righe SOLO se cambia qualcosa nei voti/stato (non ogni tick)
  const sig = JSON.stringify({ c:m.candidates.map(c=>[c.id,c.alive]), v:counts, mv:m.myVote, cv:m.canVote });
  if(sig!==voteSig){
    voteSig=sig;
    const rows = m.candidates.map(c=>{
      const dead=!c.alive, mine=m.myVote===c.id, n=counts[c.id]||0;
      return `<div class="voteRow ${dead?'dead':''} ${mine?'mine':''}" data-id="${c.id}">
        <span class="dot" style="background:${c.color}"></span>
        <span>${escapeHtml(c.name)}${dead?' 💀':''}</span>
        <span class="voteCount">${'●'.repeat(n)}</span></div>`;
    }).join('');
    const skipN=counts['skip']||0, skipMine=m.myVote==='skip';
    const rowsEl=$('#voteRows');
    if(rowsEl) rowsEl.innerHTML = rows + `
      <div class="voteRow ${skipMine?'mine':''}" data-id="skip">
        <span class="dot" style="background:#555"></span><span>Salta voto</span>
        <span class="voteCount">${'●'.repeat(skipN)}</span></div>`;
    const st=$('#voteStatus');
    if(st) st.textContent = m.canVote
      ? (m.myVote!==null ? 'Hai votato. In attesa degli altri…' : 'Tocca un giocatore (o "Salta voto") per votare.')
      : 'Sei un fantasma: non puoi votare.';
  }
}
socket.on('meetingResult', (r)=>{
  voteSig=null; curMeeting=null;
  let txt = r.skipped ? 'Nessuno è stato espulso.'
    : `${escapeHtml(r.ejected.name)} è stato espulso.<br><span style="color:var(--muted)">${r.wasImpostor?'Era un impostore.':'Non era un impostore.'}</span>`;
  $('#voteCard').innerHTML=`<h2>Esito</h2><div class="result">${txt}</div>`;
  setTimeout(()=>{ if(phase==='PLAYING') $('#overlay').classList.add('hidden'); }, 2600);
});

// ---------- Fine ----------
function showGameOver(winner){
  $('#overlay').classList.remove('hidden');
  voteSig=null; curMeeting=null;
  const win = winner==='IMPOSTOR';
  $('#voteCard').innerHTML=`
    <div class="big" style="color:${win?'var(--danger)':'var(--accent)'}">${win?'Vittoria Impostori':'Vittoria Crew'}</div>
    <div class="result" style="color:var(--muted)">Partita conclusa</div>
    <button class="btn" id="againBtn">Torna alla stanza</button>`;
  $('#againBtn').onclick=()=>socket.emit('restart');
}

// ---------- Canvas ----------
const cv=$('#cv'), ctx=cv.getContext('2d');
let VIEW={w:0,h:0};
function fitCanvas(){
  const dpr=Math.min(devicePixelRatio||1,2);
  VIEW.w=innerWidth; VIEW.h=innerHeight;
  cv.width=VIEW.w*dpr; cv.height=VIEW.h*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize',fitCanvas);
const smooth={};
function lerp(a,b,t){return a+(b-a)*t;}

function draw(){
  requestAnimationFrame(draw);
  if(!LAST || !CFG || (phase!=='PLAYING' && phase!=='MEETING')) return;
  const me = LAST.players.find(p=>p.id===ME.id);
  const camX=(me?me.x:CFG.MAP_W/2)-VIEW.w/2, camY=(me?me.y:CFG.MAP_H/2)-VIEW.h/2;

  ctx.clearRect(0,0,VIEW.w,VIEW.h);
  ctx.fillStyle='#070a15'; ctx.fillRect(0,0,VIEW.w,VIEW.h);
  ctx.fillStyle='#0e1428'; ctx.fillRect(-camX,-camY,CFG.MAP_W,CFG.MAP_H);
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let x=0;x<=CFG.MAP_W;x+=80){ctx.beginPath();ctx.moveTo(x-camX,-camY);ctx.lineTo(x-camX,CFG.MAP_H-camY);ctx.stroke();}
  for(let y=0;y<=CFG.MAP_H;y+=80){ctx.beginPath();ctx.moveTo(-camX,y-camY);ctx.lineTo(CFG.MAP_W-camX,y-camY);ctx.stroke();}
  ctx.strokeStyle='#26304f';ctx.lineWidth=4;ctx.strokeRect(-camX,-camY,CFG.MAP_W,CFG.MAP_H);
  ctx.fillStyle='#1c2647'; CFG.walls.forEach(w=>ctx.fillRect(w.x-camX,w.y-camY,w.w,w.h));

  const myTasks=(SELF.tasks||[]);
  CFG.taskSpots.forEach(s=>{
    const mine=myTasks.find(t=>t.id===s.id), active=mine&&!mine.done;
    ctx.beginPath();ctx.arc(s.x-camX,s.y-camY,14,0,7);
    ctx.fillStyle=active?'rgba(74,222,128,.9)':'rgba(120,140,190,.35)';ctx.fill();
    if(active){ctx.strokeStyle='#4ade80';ctx.lineWidth=3;ctx.stroke();
      ctx.fillStyle='#9fffc4';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(s.name,s.x-camX,s.y-camY-22);}
  });
  (LAST.bodies||[]).forEach(b=>{
    ctx.beginPath();ctx.arc(b.x-camX,b.y-camY,CFG.PLAYER_R,0,7);
    ctx.fillStyle=b.color;ctx.globalAlpha=.6;ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(b.x-8-camX,b.y-8-camY);ctx.lineTo(b.x+8-camX,b.y+8-camY);
    ctx.moveTo(b.x+8-camX,b.y-8-camY);ctx.lineTo(b.x-8-camX,b.y+8-camY);ctx.stroke();
  });
  LAST.players.forEach(p=>{
    if(!smooth[p.id]) smooth[p.id]={x:p.x,y:p.y};
    smooth[p.id].x=lerp(smooth[p.id].x,p.x,0.3); smooth[p.id].y=lerp(smooth[p.id].y,p.y,0.3);
    const x=smooth[p.id].x-camX, y=smooth[p.id].y-camY;
    ctx.globalAlpha=p.alive?1:0.45;
    ctx.beginPath();ctx.arc(x,y,CFG.PLAYER_R,0,7);ctx.fillStyle=p.color;ctx.fill();
    ctx.lineWidth=3;ctx.strokeStyle=(p.role==='IMPOSTOR')?'#ff5470':'rgba(0,0,0,.4)';ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=p.id===ME.id?'#6ee7ff':'#e8ecf7';
    ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.name+(p.alive?'':' 💀'), x, y-CFG.PLAYER_R-6);
  });
}
requestAnimationFrame(draw);
</script>
</body>
